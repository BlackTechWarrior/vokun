[meta]
name = "Web Browsers"
description = "Pick your primary web browser plus optional extras"
tags = ["desktop", "web", "browsers"]
version = "1.1.0"

[select.browser]
label = "Primary Browser"
firefox = "Open-source browser with strong privacy features and extension support"
chromium = "Open-source Chromium without proprietary Google components"
default = "firefox"

[packages.optional]
torbrowser-launcher = "Launcher for Tor Browser, enabling anonymous web browsing"

[packages.aur]
brave-bin = "Privacy-focused Chromium-based browser with built-in ad blocking"
google-chrome = "Google's browser with built-in sync, translation, and media codecs"

[hooks]
post_install = ["echo 'Browser installed. Set your default browser in your desktop environment settings.'"]
