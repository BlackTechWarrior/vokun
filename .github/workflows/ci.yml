name: CI

on:
  push:
  pull_request:

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run shellcheck on lib scripts
        run: shellcheck -s bash -e SC1091 lib/*.sh

      - name: Run shellcheck on main script
        run: shellcheck -s bash -e SC1091 vokun

      - name: Run shellcheck on installer
        run: shellcheck -s bash install.sh
